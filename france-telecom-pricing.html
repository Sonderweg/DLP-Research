const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{
      background: "rgba(15,15,20,0.95)",
      border: "1px solid rgba(255,255,255,0.08)",
      borderRadius: 6,
      padding: "10px 14px",
      fontSize: 12,
      fontFamily: "'DM Sans', sans-serif",
      backdropFilter: "blur(8px)",
    }}>
      <div style={{ color: "#999", marginBottom: 6, fontWeight: 600, letterSpacing: 0.5 }}>{label}</div>
      {payload.map((p, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
          <span style={{ width: 8, height: 8, borderRadius: "50%", background: p.color, display: "inline-block" }} />

          <span style={{ color: "#fff", fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>
            {typeof p.value === "number" ? (p.value >= 100 ? p.value.toLocaleString() : "\u20AC" + p.value.toFixed(2)) : "N/A"}

        </div>
      ))}
    </div>
  );
};

              <div key={i} style={{
                background: "rgba(255,255,255,0.025)",
                border: "1px solid rgba(255,255,255,0.06)",
                borderRadius: 8,
                padding: "14px 16px",
                borderLeft: "3px solid " + item.color,
              }}>
                <div style={{ fontSize: 11, color: "#777", marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.5 }}>{item.label}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#E8E8EC", fontVariantNumeric: "tabular-nums" }}>{item.val}</div>
                <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>{item.sub}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* FIXED CHARTS */}
      {activeTab === "fixed" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
            <ChartCard>
              <SectionTitle sub="Top fibre plan headline \u20AC/month">Premium Fibre Plans</SectionTitle>
              <ResponsiveContainer width="100%" height={280}>
                <LineChart data={fixedPremium} margin={{ top: 10, right: 20, bottom: 5, left: 0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
                  <XAxis dataKey="date" tick={{ fontSize: 10, fill: "#555" }} axisLine={{ stroke: "rgba(255,255,255,0.06)" }} tickLine={false} />
                  <YAxis tick={{ fontSize: 10, fill: "#555" }} axisLine={false} tickLine={false} domain={[40, 65]} tickFormatter={v => "\u20AC" + v} />
                  <Tooltip content={<CustomTooltip />} />
                  <Legend wrapperStyle={{ fontSize: 11, paddingTop: 8 }} />
                  <Line type="monotone" dataKey="Bouygues" stroke={operatorColors[0]} strokeWidth={2} dot={{ r: 2.5 }} />
                  <Line type="monotone" dataKey="Orange" stroke={operatorColors[1]} strokeWidth={2} dot={{ r: 2.5 }} />
                  <Line type="monotone" dataKey="SFR" stroke={operatorColors[2]} strokeWidth={2} dot={{ r: 2.5 }} />
                  <Line type="monotone" dataKey="Free" stroke={operatorColors[3]} strokeWidth={2} dot={{ r: 2.5 }} />
                </LineChart>
              </ResponsiveContainer>
            </ChartCard>

            <ChartCard>
              <SectionTitle sub="Cheapest fibre plan headline \u20AC/month (incl. sub-brands)">Entry-Level Fibre</SectionTitle>
              <ResponsiveContainer width="100%" height={280}>
                <LineChart data={fixedEntry} margin={{ top: 10, right: 20, bottom: 5, left: 0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
                  <XAxis dataKey="date" tick={{ fontSize: 10, fill: "#555" }} axisLine={{ stroke: "rgba(255,255,255,0.06)" }} tickLine={false} />
                  <YAxis tick={{ fontSize: 10, fill: "#555" }} axisLine={false} tickLine={false} domain={[18, 42]} tickFormatter={v => "\u20AC" + v} />
                  <Tooltip content={<CustomTooltip />} />
                  <Legend wrapperStyle={{ fontSize: 11, paddingTop: 8 }} />
                  <Line type="monotone" dataKey="Bouygues" stroke={operatorColors[0]} strokeWidth={2} dot={{ r: 2.5 }} />
                  <Line type="monotone" dataKey="Sosh" stroke={subBrandColors[1]} strokeWidth={2} dot={{ r: 2.5 }} />
                  <Line type="monotone" dataKey="RED" stroke={subBrandColors[2]} strokeWidth={2} dot={{ r: 2.5 }} />
                  <Line type="monotone" dataKey="Free" stroke={operatorColors[3]} strokeWidth={2} dot={{ r: 2.5 }} />
                </LineChart>
              </ResponsiveContainer>
            </ChartCard>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 20 }}>
            <ChartCard>
              <SectionTitle sub="Max advertised download speed for premium fibre tier (Mbps \u2192 Gbps)">Speed Tier Evolution</SectionTitle>
              <ResponsiveContainer width="100%" height={260}>
                <AreaChart data={fixedSpeed} margin={{ top: 10, right: 20, bottom: 5, left: 0 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
                  <XAxis dataKey="date" tick={{ fontSize: 10, fill: "#555" }} axisLine={{ stroke: "rgba(255,255,255,0.06)" }} tickLine={false} />
                  <YAxis tick={{ fontSize: 10, fill: "#555" }} axisLine={false} tickLine={false} domain={[0, 9000]} tickFormatter={v => v >= 1000 ? (v / 1000) + "G" : v + "M"} />
                  <Tooltip content={<SpeedTooltip />} />
                  <Legend wrapperStyle={{ fontSize: 11, paddingTop: 8 }} />
                  <Area type="stepAfter" dataKey="Free" stroke={operatorColors[3]} fill={operatorColors[3]} fillOpacity={0.06} strokeWidth={2} dot={{ r: 2 }} />
                  <Area type="stepAfter" dataKey="SFR" stroke={operatorColors[2]} fill={operatorColors[2]} fillOpacity={0.06} strokeWidth={2} dot={{ r: 2 }} />
                  <Area type="stepAfter" dataKey="Orange" stroke={operatorColors[1]} fill={operatorColors[1]} fillOpacity={0.1} strokeWidth={2} dot={{ r: 2 }} />
                  <Area type="stepAfter" dataKey="Bouygues" stroke={operatorColors[0]} fill={operatorColors[0]} fillOpacity={0.1} strokeWidth={2} dot={{ r: 2 }} />
                </AreaChart>
              </ResponsiveContainer>
            </ChartCard>
          </div>

          {/* Annotation */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12 }}>
            {[
              { label: "Orange premium", val: "+\u20AC3", sub: "\u20AC54.99 \u2192 \u20AC57.99 (steady rises)", color: "#FF6600" },
              { label: "SFR simplification", val: "\u2212\u20AC5", sub: "Dropped promos, cut headline to \u20AC44.99", color: "#E2001A" },
              { label: "Entry fibre", val: "\u2192 ~\u20AC25", sub: "All operators converged from \u20AC28\u2013\u20AC40", color: "#60A5FA" },
              { label: "Speed race", val: "8 Gbps", sub: "Universal by late 2024 (was 2G in 2023)", color: "#22C55E" },
            ].map((item, i) => (
              <div key={i} style={{
                background: "rgba(255,255,255,0.025)",
                border: "1px solid rgba(255,255,255,0.06)",
                borderRadius: 8,
                padding: "14px 16px",
                borderLeft: "3px solid " + item.color,
              }}>
                <div style={{ fontSize: 11, color: "#777", marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.5 }}>{item.label}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#E8E8EC", fontVariantNumeric: "tabular-nums" }}>{item.val}</div>
                <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>{item.sub}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(FrancePricingDashboard));
</script>
</body>
</html>
